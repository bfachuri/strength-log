<title>Strength Log</title>
<style>
:root{
  --bg:#05070a; --surface:#0b0f15; --surface2:#131924; --line:rgba(150,180,230,.10); --line2:rgba(150,180,230,.24);
  --text:#d6dce4; --muted:#8b93a0; --faint:#525a67;
  --amber:#ffb100; --amber-ink:#1a1200; --amber-soft:rgba(255,177,0,.12);
  --green:#2fd487; --green-ink:#04170d; --green-soft:rgba(47,212,135,.13);
  --red:#ff5f56;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme: light){
  :root{ --bg:#e9ebee; --surface:#f7f8fa; --surface2:#e3e6ea; --line:rgba(20,30,55,.15); --line2:rgba(20,30,55,.3);
    --text:#171c24; --muted:#59616e; --faint:#8a919c;
    --amber:#8f6400; --amber-ink:#fff; --amber-soft:rgba(143,100,0,.12);
    --green:#0d8a55; --green-ink:#fff; --green-soft:rgba(13,138,85,.12); --red:#c33a32; }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:15px;line-height:1.5}
body{padding-bottom:calc(72px + env(safe-area-inset-bottom));max-width:720px;margin:0 auto;
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
h1,h2,h3{margin:0;font-weight:600}
.prose{font-family:var(--sans)}
.num{font-variant-numeric:tabular-nums}

/* header */
header{position:sticky;top:0;z-index:5;background:var(--bg);
  padding:calc(14px + env(safe-area-inset-top)) 16px 10px;border-bottom:1px solid var(--line2);
  display:flex;align-items:center;justify-content:space-between;gap:8px}
header h1{font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--text)}
.sync{font-size:11px;letter-spacing:.12em;color:var(--muted);display:flex;align-items:center;gap:6px;text-transform:uppercase}
.lamp{width:7px;height:7px;border-radius:1px;background:var(--faint);display:inline-block}
.sync.on .lamp{background:var(--green)}
.sync.err .lamp{background:var(--red)}

main{padding:14px 16px}
.banner{background:var(--amber-soft);border:1px solid var(--line2);border-radius:4px;
  padding:10px 12px;font-size:12.5px;margin-bottom:14px;font-family:var(--sans)}
.eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);font-weight:600}

/* cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:14px;margin-bottom:10px}
.daycard{display:flex;align-items:center;gap:12px;cursor:pointer}
.daycard:active{border-color:var(--line2)}
.wd{font-size:10px;letter-spacing:.14em;color:var(--amber);border:1px solid var(--line2);
  border-radius:3px;padding:3px 6px;min-width:40px;text-align:center;flex:0 0 auto}
.daycard .body{flex:1;min-width:0}
.daycard h3{font-size:14px;letter-spacing:.06em;text-transform:uppercase}
.daycard .meta{color:var(--muted);font-size:11.5px;margin-top:3px;letter-spacing:.03em}
.chip{font-size:9.5px;letter-spacing:.14em;padding:3px 6px;border-radius:3px;flex:0 0 auto}
.chip.today{background:var(--amber);color:var(--amber-ink);font-weight:700}
.chip.due{background:var(--amber-soft);color:var(--amber);border:1px solid var(--line2)}
.chev{color:var(--faint);font-size:18px;flex:0 0 auto}
.restnote{color:var(--faint);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  text-align:center;padding:6px 0 12px}

/* exercise card */
.ex-name{font-size:14.5px;font-weight:600;letter-spacing:.02em}
.ex-target{font-size:11.5px;color:var(--muted);margin-top:3px;letter-spacing:.02em}
.badge-prog{display:inline-block;margin-top:7px;font-size:10px;letter-spacing:.12em;font-weight:700;
  color:var(--amber);border:1px solid var(--amber);border-radius:3px;padding:3px 7px}
.skipflag{display:inline-block;margin-top:7px;font-size:10px;letter-spacing:.12em;
  color:var(--faint);border:1px dashed var(--line2);border-radius:3px;padding:3px 7px}
.ex-links{display:flex;gap:18px;align-items:center;margin-top:8px}
.howto{background:transparent;border:none;color:var(--amber);font-size:11.5px;letter-spacing:.06em;
  cursor:pointer;padding:4px 0;font-family:var(--mono)}
.howto-body{font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.55;
  border-left:2px solid var(--line2);padding-left:10px;font-family:var(--sans)}
.demo-link{color:var(--amber);font-size:11.5px;letter-spacing:.06em;text-decoration:none;padding:4px 0}
.demo-link:active{opacity:.6}

/* set rows */
.setrow{display:grid;grid-template-columns:30px 1fr 1fr 38px;gap:8px;align-items:center;margin-top:10px}
.setrow.time,.setrow.reps{grid-template-columns:30px 1fr 38px}
.setlabel{font-size:11px;color:var(--faint);text-align:center}
input,textarea,select{font-family:var(--mono);font-size:17px;background:var(--surface2);color:var(--text);
  border:1px solid var(--line);border-radius:3px;padding:11px 10px;width:100%}
input{text-align:center;-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--amber)}
input::placeholder,textarea::placeholder{color:var(--faint)}
.field-tag{font-size:9px;color:var(--faint);text-align:center;margin-top:3px;letter-spacing:.1em;text-transform:uppercase}
.icon-btn{background:transparent;border:1px solid var(--line);border-radius:3px;color:var(--muted);
  height:44px;font-size:17px;cursor:pointer;padding:0;font-family:var(--mono)}
.icon-btn:active{background:var(--surface2)}
.addset{margin-top:11px;width:100%;background:transparent;border:1px dashed var(--line2);
  color:var(--muted);border-radius:3px;padding:10px;font-size:12px;letter-spacing:.08em;cursor:pointer;font-family:var(--mono)}
.addset:active{background:var(--surface2)}

/* buttons */
.btn{display:block;width:100%;border:none;border-radius:4px;padding:15px;font-size:13px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;cursor:pointer;font-family:var(--mono)}
.btn-primary{background:var(--amber);color:var(--amber-ink)}
.btn-primary:active{filter:brightness(.9)}
.btn-ghost{background:var(--surface);border:1px solid var(--line2);color:var(--text)}
.btn-ghost:active{background:var(--surface2)}
.btn-sm{display:inline-block;width:auto;padding:8px 12px;font-size:10.5px}

/* topbar + date */
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.back{background:transparent;border:none;color:var(--amber);font-size:13px;letter-spacing:.08em;
  cursor:pointer;padding:8px 4px;font-family:var(--mono)}
.topbar h2{font-size:14px;letter-spacing:.1em;text-transform:uppercase;flex:1}
.topedit{background:transparent;border:1px solid var(--line2);border-radius:3px;color:var(--muted);
  font-size:10px;letter-spacing:.12em;padding:7px 10px;cursor:pointer;font-family:var(--mono)}
.date-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.date-row label{font-size:10px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase}
.date-row input{width:auto;text-align:left;flex:0 0 auto;font-size:15px}

/* deload + notes */
.deload-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;
  border:1px solid var(--line);border-radius:4px;padding:10px 12px;margin-bottom:12px;background:var(--surface)}
.deload-bar .lbl{font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
.deload-bar .lbl b{color:var(--text)}
.dl-toggle{border:1px solid var(--line2);background:transparent;color:var(--muted);border-radius:3px;
  font-size:10.5px;letter-spacing:.12em;padding:8px 12px;cursor:pointer;font-family:var(--mono)}
.dl-toggle.on{background:var(--amber);color:var(--amber-ink);border-color:var(--amber);font-weight:700}

/* timer */
.timer{margin-top:12px;border-top:1px solid var(--line);padding-top:12px;
  display:flex;align-items:center;gap:10px 14px;flex-wrap:wrap}
.timer-main{display:flex;align-items:baseline;gap:10px;flex:1 1 auto;min-width:0}
.timer-clock{font-size:23px;font-weight:700;min-width:66px}
.timer-clock.work{color:var(--amber)}
.timer-phase{font-size:10.5px;color:var(--muted);letter-spacing:.06em}
.timer-btn{background:var(--surface2);border:1px solid var(--line2);color:var(--text);border-radius:3px;
  padding:12px 14px;font-size:11px;letter-spacing:.08em;font-weight:600;cursor:pointer;
  font-family:var(--mono);white-space:nowrap}
.timer-btn:active{filter:brightness(.94)}
.timer-reset{background:transparent;border:none;color:var(--faint);font-size:17px;cursor:pointer;padding:8px}
.rest-target{display:flex;align-items:center;gap:8px;flex-basis:100%;font-size:10px;
  letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-top:2px}
.rt-val{color:var(--text);font-size:12.5px;min-width:44px;text-align:center;letter-spacing:0}
.rt-btn{background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:3px;
  width:32px;height:32px;font-size:16px;line-height:1;cursor:pointer;padding:0;font-family:var(--mono)}
.timer-log{font-size:10.5px;color:var(--faint);margin-top:6px;flex-basis:100%;line-height:1.7;letter-spacing:.02em}

/* rest overlay — the gauge */
#restOverlay{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;align-items:center;
  justify-content:center;gap:20px;background:#000;color:#4b5462;text-align:center;
  padding:calc(20px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom))}
#restOverlay.show{display:flex}
#restOverlay.fired{background:var(--green);color:var(--green-ink)}
.gauge{position:relative;width:min(70vw,280px);aspect-ratio:1/1}
.gauge svg{width:100%;height:100%;transform:rotate(-90deg)}
.gauge .ring{stroke:#161b22;fill:none}
.gauge .tick{stroke:#1d242e}
.gauge .arc{stroke:var(--amber);fill:none;stroke-linecap:butt;transition:stroke-dashoffset .25s linear}
#restOverlay.fired .ring{stroke:rgba(0,0,0,.16)}
#restOverlay.fired .tick{stroke:rgba(0,0,0,.16)}
#restOverlay.fired .arc{stroke:var(--green-ink)}
.gauge .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
#restLabel{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:#4b5462}
#restOverlay.fired #restLabel{color:var(--green-ink)}
#restClock{font-size:54px;font-weight:700;line-height:1;color:var(--amber);font-variant-numeric:tabular-nums}
#restOverlay.fired #restClock{color:var(--green-ink)}
#restNext{font-size:11px;letter-spacing:.08em;color:#5b626f;max-width:320px;line-height:1.7}
#restOverlay.fired #restNext{color:var(--green-ink)}
#restStart{background:#10141b;color:#9aa2ae;border:1px solid #242b36;border-radius:4px;
  padding:16px 30px;font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;font-family:var(--mono)}
#restOverlay.fired #restStart{background:var(--green-ink);color:var(--green);border-color:transparent}
#restDismiss{position:absolute;top:calc(14px + env(safe-area-inset-top));right:18px;background:transparent;
  border:none;color:#3c434e;font-size:22px;cursor:pointer;padding:10px;line-height:1}
#restOverlay.fired #restDismiss{color:var(--green-ink)}
@media (prefers-reduced-motion: reduce){ .gauge .arc{transition:none} }

/* toast + nav */
.toast{position:fixed;left:50%;bottom:calc(84px + env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--green);
  color:var(--green-ink);padding:11px 18px;border-radius:4px;font-size:11.5px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;opacity:0;transition:opacity .25s;pointer-events:none;z-index:1200}
.toast.show{opacity:1}
nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--surface);
  border-top:1px solid var(--line2);padding:6px 8px max(6px, min(34px, env(safe-area-inset-bottom)));z-index:10}
nav button{flex:1;background:transparent;border:none;color:var(--faint);font-size:9.5px;font-weight:700;
  letter-spacing:.2em;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:9px 0 3px;font-family:var(--mono);text-transform:uppercase}
nav button .dot{width:5px;height:5px;border-radius:1px;background:currentColor}
nav button.active{color:var(--amber)}

/* progress */
select{font-size:13px;margin-bottom:14px;letter-spacing:.02em}
.spark-wrap{display:flex;align-items:flex-end;gap:14px;margin:6px 0 16px;flex-wrap:wrap}
.spark-stat .big{font-size:24px;font-weight:700}
.spark-stat .lbl{font-size:9.5px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.hist{width:100%;border-collapse:collapse;font-size:12.5px}
.hist th{text-align:left;color:var(--faint);font-weight:600;font-size:9.5px;letter-spacing:.14em;
  text-transform:uppercase;padding:7px 6px;border-bottom:1px solid var(--line2)}
.hist td{padding:9px 6px;border-bottom:1px solid var(--line);font-size:12.5px}
.hist td.d{color:var(--muted);font-size:11.5px}
.pr{color:var(--green)}
.empty{color:var(--muted);font-size:12.5px;text-align:center;padding:30px 10px;font-family:var(--sans)}

/* data + session log */
.note{font-size:12px;color:var(--muted);margin:6px 0 14px;font-family:var(--sans);line-height:1.55}
.nudge{background:var(--amber-soft);border:1px solid var(--line2);border-radius:3px;
  padding:8px 10px;font-size:10.5px;letter-spacing:.08em;color:var(--amber);margin-bottom:12px}
textarea{height:140px;font-size:11.5px;margin-top:8px}
textarea.notes{height:64px;font-size:14px;font-family:var(--sans)}
.danger{color:var(--red)}
.sess-row{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line)}
.sess-row .when{flex:1;min-width:0}
.sess-row .when .d1{font-size:12.5px}
.sess-row .when .d2{font-size:10.5px;color:var(--muted);margin-top:2px;letter-spacing:.03em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-row button{flex:0 0 auto;background:transparent;border:1px solid var(--line2);border-radius:3px;
  color:var(--muted);font-size:9.5px;letter-spacing:.12em;padding:8px 10px;cursor:pointer;font-family:var(--mono)}

/* plan editor */
.ed-row{display:flex;align-items:center;gap:8px;padding:10px 2px;border-bottom:1px solid var(--line)}
.ed-row .nm{flex:1;min-width:0}
.ed-row .nm .n1{font-size:13px}
.ed-row .nm .n2{font-size:10.5px;color:var(--muted);margin-top:2px}
.ed-row button{flex:0 0 auto;background:transparent;border:1px solid var(--line);border-radius:3px;
  color:var(--muted);width:38px;height:38px;font-size:14px;cursor:pointer;font-family:var(--mono)}
.lib{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.lib button{background:var(--surface2);border:1px solid var(--line);border-radius:3px;color:var(--text);
  font-size:11px;padding:9px 11px;cursor:pointer;font-family:var(--mono)}
.formgrid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px}
.formgrid input,.formgrid select{font-size:14px;text-align:left}
</style>

<header>
  <h1>Strength Log</h1>
  <span class="sync" id="syncTag"><span class="lamp"></span><span id="syncTxt">…</span></span>
</header>
<main id="app"></main>
<div class="toast" id="toast"></div>
<nav>
  <button data-tab="train" class="active"><span class="dot"></span>Train</button>
  <button data-tab="progress"><span class="dot"></span>Progress</button>
  <button data-tab="data"><span class="dot"></span>Data</button>
</nav>

<script>
/* ============ SEED PROGRAM (ids are permanent — history is keyed on them) ============ */
const DEFAULT_PLAN = [
  { id:"daily", wd:"DAILY", name:"Daily Minimum", sub:"Push-ups · Plank · every day", ex:[
    {id:"dy_push", name:"Push-ups", type:"reps", target:"3 × submax · RIR 2+", info:"Hands under shoulders, body in one straight line. Chest to just above the floor, press back up. Always stop 2+ reps shy of failure — this is daily practice, not a max test. On Mon/Thu press days, one easy set is enough."},
    {id:"dy_plank", name:"Plank", type:"time", target:"3 × 30–45 sec", info:"Forearms down, elbows under shoulders. Squeeze glutes and brace so the hips stay level — no sagging, no piking. Steady breathing; stop the clock when form breaks."},
  ]},
  { id:"pushA", wd:"MON", name:"Push A", sub:"Chest · Shoulders · Triceps", ex:[

/* ============ STORAGE (claude host → localStorage → memory) ============ */
async function stGet(k){
  if(STORE==="claude"){ try{ const r=await window.storage.get(k); return r&&r.value!=null?r.value:null; }catch(e){ return null; } }
  if(STORE==="local"){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  return null;
}
async function stSet(k,v){
  if(STORE==="claude"){ await window.storage.set(k,v); return; }
  if(STORE==="local"){ localStorage.setItem(k,v); return; }
}
async function detectStore(){
  if(window.storage && window.storage.get){
    try{ await window.storage.get(KEY_S); STORE="claude"; return; }
    catch(e){ try{ await window.storage.set(KEY_S+"_probe","1"); STORE="claude"; return; }catch(e2){} }
  }
  try{ localStorage.setItem(KEY_S+"_probe","1"); localStorage.removeItem(KEY_S+"_probe"); STORE="local"; return; }
  catch(e){}
  STORE=null; memOnly=true;
}
async function loadAll(){
  try{ const s=await stGet(KEY_S);   if(s) SESSIONS=JSON.parse(s); }catch(e){}
  try{ const p=await stGet(KEY_P);   if(p) PLAN=JSON.parse(p); }catch(e){}
  try{ const t=await stGet(KEY_SET); if(t) SETTINGS=Object.assign(SETTINGS,JSON.parse(t)); }catch(e){}
  if(!PLAN || !Array.isArray(PLAN) || !PLAN.length) PLAN=JSON.parse(JSON.stringify(DEFAULT_PLAN));
  storageOK=!memOnly;
  buildIndex();
}
async function persistSessions(){ if(memOnly) return; try{ await stSet(KEY_S,JSON.stringify(SESSIONS)); storageOK=true; }catch(e){ storageOK=false; } setSync(); }
async function persistPlan(){
  PLAN.forEach(d=>d.ex.forEach(e=>{ SETTINGS.exMeta[e.id]={name:e.name,type:e.type,target:e.target}; }));
  buildIndex();
  if(memOnly) return;
  try{ await stSet(KEY_P,JSON.stringify(PLAN)); await stSet(KEY_SET,JSON.stringify(SETTINGS)); storageOK=true; }catch(e){ storageOK=false; }
  setSync();
}
async function persistSettings(){ if(memOnly) return; try{ await stSet(KEY_SET,JSON.stringify(SETTINGS)); }catch(e){} }
function buildIndex(){
  EX_INDEX={};
  LEGACY_PLAN.forEach(d=>d.ex.forEach(e=>EX_INDEX[e.id]={...e,day:"Retired",retired:true}));
  DEFAULT_PLAN.forEach(d=>d.ex.forEach(e=>EX_INDEX[e.id]={...e,day:d.name,retired:true}));
  Object.keys(SETTINGS.exMeta||{}).forEach(id=>{ EX_INDEX[id]=Object.assign({id,retired:true,day:"Custom"},EX_INDEX[id]||{},SETTINGS.exMeta[id]); });
  PLAN.forEach(d=>d.ex.forEach(e=>EX_INDEX[e.id]={...e,day:d.name,retired:false}));
}

const $=(s,el=document)=>el.querySelector(s);
const app=document.getElementById("app");
let TAB="train";
function todayISO(){ const d=new Date(),p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }
function fmtDate(iso){ const [y,m,d]=iso.split("-"); return new Date(y,m-1,d).toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function clk(s){ s=Math.max(0,Math.round(s)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function showToast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1700); }
function sanitizeNote(s){ return (s||"").replace(/[,\r\n]+/g," · ").trim().slice(0,300); }
function lastEntryFor(exId, excludeId){
  const sorted=[...SESSIONS].sort((a,b)=> b.date.localeCompare(a.date) || String(b.id).localeCompare(String(a.id)));
  for(const s of sorted){ if(excludeId && s.id===excludeId) continue;
    if(s.entries[exId] && s.entries[exId].length) return s.entries[exId]; }
  return null;
}
function topMetric(ex,sets){
  if(!sets||!sets.length) return null;
  if(ex.type==="time") return Math.max(...sets.map(x=>+x.s||0));
  if(ex.type==="reps") return Math.max(...sets.map(x=>+x.r||0));
  return Math.max(...sets.map(x=>+x.w||0));
}
function volumeOf(sets){ return Math.round(sets.reduce((a,x)=>a+(+x.w||0)*(+x.r||0),0)); }
function sessionVolume(s){ let v=0; Object.keys(s.entries).forEach(id=>{ const ex=EX_INDEX[id]; if(ex&&ex.type==="load") v+=volumeOf(s.entries[id]); }); return v; }
function sessionMinutes(s){ let sec=0,found=false; Object.values(s.entries).forEach(sets=>sets.forEach(x=>{ if(x.sw!=null||x.sr!=null){found=true; sec+=(+x.sw||0)+(+x.sr||0);} })); return found?Math.round(sec/60):null; }
function wantSets(target){ const m=String(target).match(/^\s*(\d+)\s*×/); return m?+m[1]:null; }
function topOfRange(target){
  let m=String(target).match(/×\s*\d+\s*[–—-]\s*(\d+)/); if(m) return +m[1];
  m=String(target).match(/×\s*(\d+)/); return m?+m[1]:null;
}
function restDefault(ex){
  if(ex.type==="reps") return 45;
  const m=String(ex.target).match(/×\s*(\d+)/); const lo=m?+m[1]:10;
  if(lo<=6) return 120; if(lo<=8) return 90; if(lo<=10) return 75; return 60;
}
function restTargetFor(ex){ return SETTINGS.restTargets[ex.id] || restDefault(ex); }
function progressionDue(exId){
  const ex=EX_INDEX[exId]; if(!ex||ex.type!=="load") return false;
  const top=topOfRange(ex.target); if(!top) return false;
  const hist=[...SESSIONS].filter(s=>!s.deload && s.entries[exId] && s.entries[exId].length)
    .sort((a,b)=> b.date.localeCompare(a.date) || String(b.id).localeCompare(String(a.id))).slice(0,2);
  if(hist.length<2) return false;
  const full=s=>s.entries[exId].every(x=>(+x.r||0)>=top && (+x.w||0)>0);
  if(!full(hist[0])||!full(hist[1])) return false;
  const mx=s=>Math.max(...s.entries[exId].map(x=>+x.w||0));
  return mx(hist[0])>=mx(hist[1]);
}
function deloadWeight(w){ return Math.round((+w||0)*0.675*2)/2; }

/* ============ AUDIO + WAKE LOCK ============ */
let AC=null;
function unlockAudio(){ try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==="suspended") AC.resume(); }catch(e){} }
function beep(){
  try{
    if(!AC) return;
    const tone=(f,at,dur)=>{ const o=AC.createOscillator(),g=AC.createGain(); o.type="sine"; o.frequency.value=f;
      o.connect(g); g.connect(AC.destination);
      g.gain.setValueAtTime(0.0001,AC.currentTime+at);
      g.gain.exponentialRampToValueAtTime(0.5,AC.currentTime+at+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+at+dur);
      o.start(AC.currentTime+at); o.stop(AC.currentTime+at+dur+0.02); };
    tone(880,0,0.18); tone(1245,0.22,0.3);
  }catch(e){}
}
let wakeSentinel=null;
async function acquireWake(){
  try{
    if("wakeLock" in navigator){
      wakeSentinel=await navigator.wakeLock.request("screen");
      wakeSentinel.addEventListener("release",()=>{ wakeSentinel=null; });
    }
  }catch(e){}
}
function releaseWake(){ try{ if(wakeSentinel){ wakeSentinel.release(); wakeSentinel=null; } }catch(e){} }

/* ============ REST OVERLAY — the gauge ============ */
const GR=118, GC=2*Math.PI*GR;   // gauge radius + circumference (viewBox 260)
let ov=null, ovArc=null, ovClock=null, ovLabel=null, ovNext=null, ovStart=null;
function ensureOverlay(){
  if(ov) return;
  ov=document.createElement("div"); ov.id="restOverlay";
  const dis=document.createElement("button"); dis.id="restDismiss"; dis.textContent="✕"; dis.setAttribute("aria-label","Hide rest timer");
  dis.onclick=()=>Rest.stop();
  const g=document.createElement("div"); g.className="gauge";
  let ticks="";
  for(let i=0;i<12;i++){ const a=i*Math.PI/6, x1=130+ (GR+8)*Math.cos(a), y1=130+(GR+8)*Math.sin(a), x2=130+(GR+14)*Math.cos(a), y2=130+(GR+14)*Math.sin(a);
    ticks+=`<line class="tick" x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke-width="2"/>`; }
  g.innerHTML=`<svg viewBox="0 0 260 260" aria-hidden="true">
    <circle class="ring" cx="130" cy="130" r="${GR}" stroke-width="7"/>${ticks}
    <circle class="arc" id="restArc" cx="130" cy="130" r="${GR}" stroke-width="7"
      stroke-dasharray="${GC.toFixed(1)}" stroke-dashoffset="0"/></svg>
    <div class="center"><div id="restLabel">Rest</div><div id="restClock" class="num">0:00</div></div>`;
  ovNext=document.createElement("div"); ovNext.id="restNext";
  ovStart=document.createElement("button"); ovStart.id="restStart"; ovStart.textContent="Start set";
  ovStart.onclick=()=>{ unlockAudio(); Rest.startNext(); };
  ov.appendChild(dis); ov.appendChild(g); ov.appendChild(ovNext); ov.appendChild(ovStart);
  document.body.appendChild(ov);
  ovArc=ov.querySelector("#restArc"); ovClock=ov.querySelector("#restClock"); ovLabel=ov.querySelector("#restLabel");
}
const Rest={
  active:false, target:0, startTs:0, loop:null, onStart:null, alerted:false,
  start(o){
    ensureOverlay();
    this.active=true; this.target=o.target; this.startTs=Date.now(); this.onStart=o.onStart; this.alerted=false;
    ov.classList.remove("fired"); ov.classList.add("show");
    ovLabel.textContent="Rest"; ovNext.innerHTML=o.nextInfo||""; ovStart.textContent=o.btnLabel||"Start set";
    acquireWake(); this.run();
  },
  run(){
    if(!this.active) return;
    const remain=this.target-(Date.now()-this.startTs)/1000;
    if(remain<=0){
      if(!this.alerted){ this.alerted=true; flood(); }
      ovClock.textContent="+"+clk(-remain);
      ovArc.style.strokeDashoffset=0;
    } else {
      ovClock.textContent=clk(remain);
      ovArc.style.strokeDashoffset=(GC*(1-remain/Math.max(1,this.target))).toFixed(1);
    }
    this.loop=setTimeout(()=>this.run(),250);
  },
  startNext(){ const cb=this.onStart; this.stop(); if(cb) cb(); },
  stop(){
    this.active=false; this.onStart=null;
    if(this.loop){ clearTimeout(this.loop); this.loop=null; }
    if(ov) ov.classList.remove("show","fired");
    releaseWake();
  }
};
function flood(){
  beep();
  if(navigator.vibrate){ try{ navigator.vibrate([180,90,180]); }catch(e){} }
  if(ov){ ov.classList.add("fired"); ovLabel.textContent="Go"; }
}
function endRestUI(){ Rest.stop(); }
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible" && Rest.active && !wakeSentinel) acquireWake(); });

  const order=[tD,dD,...PLAN.filter(d=>d!==tD&&d!==dD)].filter(Boolean);
  order.forEach(d=>{
    const logged=SESSIONS.filter(s=>s.dayId===d.id).length;
    const due=d.ex.filter(e=>progressionDue(e.id)).length;
    const card=document.createElement("div"); card.className="card daycard";
    card.innerHTML=`<span class="wd">${d.wd||""}</span>
      <div class="body"><h3>${d.name}</h3><div class="meta">${d.sub||""}${logged?` · ${logged} logged`:""}</div></div>
      ${d.id===todayId?`<span class="chip today">Today</span>`:d.id==="daily"?`<span class="chip due">Every day</span>`:""}
      ${due?`<span class="chip due">${due} ↑</span>`:""}
      <span class="chev">›</span>`;
    card.onclick=()=>renderDay(d.id);
    app.appendChild(card);
  });
}

function prevSummary(ex,sets){
  if(ex.type==="time") return sets.map(x=>x.s+"s").join(" / ");
  if(ex.type==="reps") return sets.map(x=>x.r).join(" / ")+" reps";
  return sets.map(x=>`${x.w}×${x.r}`).join(" / ");
}
function addSetRow(wrap, ex, idx, val){
  const row=document.createElement("div"); row.className="setrow "+(ex.type==="load"?"":ex.type);
  const lbl=document.createElement("div"); lbl.className="setlabel"; lbl.textContent=idx+1; row.appendChild(lbl);
  const mk=(ph,v,tag)=>{ const w=document.createElement("div");
    const inp=document.createElement("input"); inp.inputMode="decimal"; inp.placeholder=ph;
    if(v!=null&&v!=="") inp.value=v; w.appendChild(inp);
    const t=document.createElement("div"); t.className="field-tag"; t.textContent=tag; w.appendChild(t);
    return {w,inp}; };
  let f1,f2;
  if(ex.type==="time"){ f1=mk("sec",val?val.s:null,"sec"); row.appendChild(f1.w); }
  else if(ex.type==="reps"){ f1=mk("0",val?val.r:null,"reps"); row.appendChild(f1.w); }
  else { f1=mk("kg",val?val.w:null,"kg"); f2=mk("reps",val?val.r:null,"reps"); row.appendChild(f1.w); row.appendChild(f2.w); }
  const del=document.createElement("button"); del.className="icon-btn"; del.textContent="×";
  del.onclick=()=>{ row.remove(); [...wrap.children].forEach((r,i)=>r.querySelector(".setlabel").textContent=i+1); };
  row.appendChild(del);
  row._read=()=>{
    if(ex.type==="time"){ const s=parseFloat(f1.inp.value); return isNaN(s)?null:{s}; }
    if(ex.type==="reps"){ const r=parseFloat(f1.inp.value); return isNaN(r)?null:{r}; }
    const w=parseFloat(f1.inp.value), r=parseFloat(f2.inp.value);
    if(isNaN(w)&&isNaN(r)) return null; return {w:isNaN(w)?0:w, r:isNaN(r)?0:r};
  };
  wrap.appendChild(row);
}
function makeTimer(ex, prev){
  const T=(draft.timing[ex.id]={phase:"idle", setIdx:0, startTs:0, sets:[]});
  let target=restTargetFor(ex);
  const wrap=document.createElement("div"); wrap.className="timer";
  const main=document.createElement("div"); main.className="timer-main";
  const clock=document.createElement("span"); clock.className="timer-clock num"; clock.textContent="0:00"; clock.dataset.running="0";
  const phase=document.createElement("div"); phase.className="timer-phase"; phase.textContent="Ready";
  main.appendChild(clock); main.appendChild(phase);
  const btn=document.createElement("button"); btn.className="timer-btn"; btn.textContent="▶ Start set 1";
  const reset=document.createElement("button"); reset.className="timer-reset"; reset.textContent="↺"; reset.title="Reset timer";
  const rt=document.createElement("div"); rt.className="rest-target";
  const minus=document.createElement("button"); minus.className="rt-btn"; minus.textContent="−";
  const val=document.createElement("span"); val.className="rt-val num"; val.textContent=target+"s";
  const plus=document.createElement("button"); plus.className="rt-btn"; plus.textContent="+";
  function setTarget(v){ target=Math.max(15,v); val.textContent=target+"s";
    SETTINGS.restTargets[ex.id]=target; persistSettings();
    if(T.phase==="rest") Rest.target=target; }
  minus.onclick=()=>setTarget(target-15);
  plus.onclick=()=>setTarget(target+15);
  rt.appendChild(document.createTextNode("Rest target")); rt.appendChild(minus); rt.appendChild(val); rt.appendChild(plus);
  const log=document.createElement("div"); log.className="timer-log num";
  function renderLog(){
    log.textContent=T.sets.filter(Boolean).map((s,i)=>{
      const w=s.work!=null?clk(s.work)+" set":"", r=s.rest!=null?clk(s.rest)+" rest":"";
      return `S${i+1} ${[w,r].filter(Boolean).join(" · ")}`.trim();
    }).join("    ");
  }
  function nextInfoFor(n){
    const t=`SET ${n} · ${ex.target}`;
    const p=prev&&prev[n-1];
    const last=p?( ex.type==="reps" ? `LAST ${p.r} REPS` : `LAST ${p.w} × ${p.r}` ):"";
    return `${ex.name.toUpperCase()}<br>${t}${last?"<br>"+last:""}`;
  }
  function enterWork(){
    unlockAudio();
    const now=Date.now();
    if(T.phase==="rest"){ const el=Math.round((now-T.startTs)/1000); (T.sets[T.setIdx]=T.sets[T.setIdx]||{}).rest=el; T.setIdx++; }
    T.sets[T.setIdx]=T.sets[T.setIdx]||{};
    T.phase="work"; T.startTs=now;
    clock.classList.add("work"); clock.dataset.start=now; clock.dataset.running="1"; clock.textContent="0:00";
    phase.textContent=`Set ${T.setIdx+1} — working`;
    btn.textContent=`■ Done set ${T.setIdx+1} → rest`;
    startTick(); renderLog();
  }
  function enterRest(){
    unlockAudio();
    const now=Date.now();
    const el=Math.round((now-T.startTs)/1000); (T.sets[T.setIdx]=T.sets[T.setIdx]||{}).work=el;
    T.phase="rest"; T.startTs=now;
    clock.classList.remove("work"); clock.dataset.running="0"; clock.textContent="rest";
    phase.textContent=`Resting · ${target}s target`;
    btn.textContent=`▶ Start set ${T.setIdx+2}`;
    Rest.start({ target, onStart:enterWork, btnLabel:`Start set ${T.setIdx+2}`, nextInfo:nextInfoFor(T.setIdx+2) });
    renderLog();
  }
  btn.onclick=()=>{
    if(T.phase==="work") enterRest();
    else { Rest.stop(); enterWork(); }
  };
  reset.onclick=()=>{
    Rest.stop();
    T.phase="idle"; T.setIdx=0; T.sets=[]; T.startTs=0;
    clock.classList.remove("work"); clock.dataset.running="0"; clock.textContent="0:00";
    phase.textContent="Ready"; btn.textContent="▶ Start set 1"; log.textContent="";
  };
  wrap.appendChild(main); wrap.appendChild(btn); wrap.appendChild(reset); wrap.appendChild(rt); wrap.appendChild(log);
  return wrap;
}
async function saveSession(){
  const day=PLAN.find(d=>d.id===draft.dayId)||{ex:[]};
  const entries={}; let any=false;
  const ids=new Set(day.ex.map(e=>e.id));
  if(draft.editRef) Object.keys(draft.editRef.entries).forEach(id=>ids.add(id));
  ids.forEach(exId=>{
    const wrap=app.querySelector(`[data-ex="${exId}"]`);
    if(!wrap){ if(draft.editRef && draft.editRef.entries[exId]) { entries[exId]=draft.editRef.entries[exId]; any=true; } return; }
    const sets=[...wrap.children].map(r=>r._read()).filter(Boolean);
    if(sets.length){
      const T=draft.timing[exId];
      if(T) sets.forEach((set,i)=>{ const t=T.sets[i]; if(t){ if(t.work!=null)set.sw=t.work; if(t.rest!=null)set.sr=t.rest; }
        else if(draft.editRef && draft.editRef.entries[exId] && draft.editRef.entries[exId][i]){
          const o=draft.editRef.entries[exId][i]; if(o.sw!=null)set.sw=o.sw; if(o.sr!=null)set.sr=o.sr; } });
      else if(draft.editRef && draft.editRef.entries[exId]) sets.forEach((set,i)=>{ const o=draft.editRef.entries[exId][i]; if(o){ if(o.sw!=null)set.sw=o.sw; if(o.sr!=null)set.sr=o.sr; } });
      entries[exId]=sets; any=true;
    }
  });
  if(!any){ showToast("Log at least one set"); return; }
  const notes=sanitizeNote(draft.notes);
  if(draft.editRef){
    const s=SESSIONS.find(x=>x.id===draft.editId);
    if(s){ s.date=draft.date; s.entries=entries; s.deload=!!draft.deload; if(notes)s.notes=notes; else delete s.notes; }
    await persistSessions(); leaveWorkout(); showToast("Session updated"); renderData(); return;
  }
  const sess={ id:Date.now().toString(36), date:draft.date, dayId:draft.dayId, entries };
  if(draft.deload) sess.deload=true;
  if(notes) sess.notes=notes;
  SESSIONS.push(sess);
  await persistSessions(); leaveWorkout(); showToast("Session saved"); renderTrain();
}

function renderExProgress(out, ex){
  const series=SESSIONS.filter(s=>s.entries[ex.id]).sort((a,b)=>a.date.localeCompare(b.date))
    .map(s=>({date:s.date, deload:!!s.deload, top:topMetric(ex,s.entries[ex.id]),
              vol: ex.type==="load"?volumeOf(s.entries[ex.id]):null, sets:s.entries[ex.id]}));
  if(!series.length){ out.innerHTML=`<div class="empty">No sessions logged for ${ex.name} yet.</div>`; return; }
  const unit=ex.type==="time"?"sec":ex.type==="reps"?"reps":"kg";
  const latest=series[series.length-1], peak=Math.max(...series.map(p=>p.top));
  out.innerHTML="";
  const stat=document.createElement("div"); stat.className="spark-wrap";
  stat.innerHTML=`<div class="spark-stat"><div class="big num">${latest.top}<span style="font-size:12px;color:var(--muted)"> ${unit}</span></div><div class="lbl">Latest top</div></div>`
    + spark(series.map(p=>p.top))
    + `<div class="spark-stat"><div class="big num" style="color:var(--amber)">${peak}</div><div class="lbl">Best</div></div>`
    + (latest.vol!=null?`<div class="spark-stat"><div class="big num">${latest.vol}<span style="font-size:12px;color:var(--muted)"> kg</span></div><div class="lbl">Last volume</div></div>`:"");
  out.appendChild(stat);
  const tbl=document.createElement("table"); tbl.className="hist";
  tbl.innerHTML=`<tr><th>Date</th><th>Sets</th><th>Top</th>${ex.type==="load"?"<th>Vol</th>":""}</tr>`;
  [...series].reverse().forEach(p=>{
    const isPR=p.top>=peak && p.top>0 && !p.deload;
    const setsTxt = ex.type==="time"? p.sets.map(x=>x.s+"s").join(" ")
      : ex.type==="reps"? p.sets.map(x=>x.r).join(" ")
      : p.sets.map(x=>`${x.w}×${x.r}`).join("  ");
    tbl.insertAdjacentHTML("beforeend",
      `<tr><td class="d">${fmtDate(p.date)}${p.deload?" ·D":""}</td><td class="num">${setsTxt}</td>`+
      `<td class="num ${isPR?"pr":""}">${p.top}${isPR?" ★":""}</td>${ex.type==="load"?`<td class="num">${p.vol}</td>`:""}</tr>`);
  });
  out.appendChild(tbl);
}
function spark(vals){
  const w=140,h=44,pad=4; if(vals.length<2) return `<svg width="${w}" height="${h}" style="flex:1"></svg>`;
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>[pad+i*(w-2*pad)/(vals.length-1), h-pad-((v-min)/rng)*(h-2*pad)]);
  const d=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const last=pts[pts.length-1];
  return `<svg width="${w}" height="${h}" style="flex:1"><path d="${d}" fill="none" stroke="var(--amber)" stroke-width="2" stroke-linejoin="round"/><circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3" fill="var(--amber)"/></svg>`;
}

/* ============ DATA ============ */
function buildCSV(){
  const rows=[["date","day","exercise","set","weight_kg","reps","seconds","set_seconds","rest_seconds","notes"]];
  [...SESSIONS].sort((a,b)=>a.date.localeCompare(b.date)).forEach(s=>{
    const dayName=dayNameOf(s.dayId);
    const note=sanitizeNote(s.notes);
    Object.keys(s.entries).forEach(exId=>{
      const ex=EX_INDEX[exId]||{name:exId};
      s.entries[exId].forEach((set,i)=>{
        rows.push([s.date, dayName, ex.name, i+1,
          set.w!=null?set.w:"", set.r!=null?set.r:"", set.s!=null?set.s:"",
          set.sw!=null?set.sw:"", set.sr!=null?set.sr:"", note]);
      });
    });
  });
  return rows.map(r=>r.join(",")).join("\n");
}
function dayNameOf(id){ return (PLAN.find(d=>d.id===id)||DEFAULT_PLAN.find(d=>d.id===id)||LEGACY_PLAN.find(d=>d.id===id)||{name:id}).name; }
function findDayByName(n){ return PLAN.find(d=>d.name===n)||DEFAULT_PLAN.find(d=>d.name===n)||LEGACY_PLAN.find(d=>d.name===n)||null; }
function findExByName(day,n){
  const pools=[PLAN,DEFAULT_PLAN,LEGACY_PLAN].map(p=>p.find(d=>d.id===day.id)).filter(Boolean);
  for(const d of pools){ const e=d.ex.find(x=>x.name===n); if(e) return e; }
  return null;
}
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/); lines.shift();
  const byKey={};
  lines.forEach(line=>{
    const c=line.split(","); if(c.length<7) return;
    const [date,dayName,exName,setN,w,r,s,sw,sr,note]=c;
    const day=findDayByName(dayName); if(!day) return;
    const ex=findExByName(day,exName); if(!ex) return;
    const k=date+"|"+day.id;
    if(!byKey[k]) byKey[k]={ id:(Date.parse(date)||Date.now()).toString(36)+Math.random().toString(36).slice(2,5), date, dayId:day.id, entries:{} };
    if(note && !byKey[k].notes) byKey[k].notes=note;
    if(!byKey[k].entries[ex.id]) byKey[k].entries[ex.id]=[];
    const set={};
    if(w!==""&&w!=null)set.w=+w; if(r!==""&&r!=null)set.r=+r; if(s!==""&&s!=null)set.s=+s;
    if(sw!==undefined&&sw!=="")set.sw=+sw; if(sr!==undefined&&sr!=="")set.sr=+sr;
    byKey[k].entries[ex.id].push(set);
  });
  return Object.values(byKey);
}
function renderData(){
  leaveWorkout();
  app.innerHTML="";
  const csv=buildCSV(), count=SESSIONS.length;
  const days=SETTINGS.lastExport?Math.floor((Date.now()-SETTINGS.lastExport)/86400000):null;
  const c1=document.createElement("div"); c1.className="card";
  c1.innerHTML=`<div class="eyebrow">Your data</div><div class="ex-name num">${count} session${count===1?"":"s"} logged</div>`;
  if(count && (days===null||days>14))
    c1.insertAdjacentHTML("beforeend",`<div class="nudge">${days===null?"No backup yet":"Last backup "+days+" days ago"} — export recommended</div>`);
  c1.insertAdjacentHTML("beforeend",`<div class="note">${STORE==="local"?"Saved on this device.":STORE==="claude"?"Saved to your Claude account.":"Not saving in this preview."} A CSV export is your backup, and how data moves to another device. <span style="color:var(--faint)">· v${BUILD}</span></div>`);
  const exp=document.createElement("button"); exp.className="btn btn-primary"; exp.textContent="Export CSV";
  const ta=document.createElement("textarea"); ta.readOnly=true; ta.value=csv; ta.style.display="none";
  exp.onclick=async()=>{ try{ const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob);
      const a=document.createElement("a"); a.href=url; a.download="strength_log.csv"; a.click(); URL.revokeObjectURL(url);
    }catch(e){}
    ta.style.display="block"; ta.select();
    SETTINGS.lastExport=Date.now(); await persistSettings();
    showToast("CSV ready — copy if it didn't download"); };
  c1.appendChild(exp); c1.appendChild(ta); app.appendChild(c1);

  const cl=document.createElement("div"); cl.className="card";
  cl.innerHTML=`<div class="eyebrow">Session log · tap edit to fix a mistake</div>`;
  const recent=[...SESSIONS].sort((a,b)=> b.date.localeCompare(a.date) || String(b.id).localeCompare(String(a.id)));
  if(!recent.length) cl.insertAdjacentHTML("beforeend",`<div class="empty">Nothing logged yet.</div>`);
  recent.slice(0,40).forEach(s=>{
    const dayName=dayNameOf(s.dayId);
    const vol=sessionVolume(s), mins=sessionMinutes(s);
    const row=document.createElement("div"); row.className="sess-row";
    row.innerHTML=`<div class="when"><div class="d1">${fmtDate(s.date)} · ${dayName}${s.deload?" · DELOAD":""}</div>
      <div class="d2 num">${vol?vol+" kg":""}${vol&&mins?" · ":""}${mins?mins+" min":""}${s.notes?" · "+s.notes:""}</div></div>`;
    const eb=document.createElement("button"); eb.textContent="Edit";
    eb.onclick=()=>{ TAB="train"; syncNav(); renderDay(s.dayId, s); };
    const db=document.createElement("button"); db.textContent="✕"; db.classList.add("danger"); let armed=false;
    db.onclick=async()=>{ if(!armed){ armed=true; db.textContent="Sure?"; setTimeout(()=>{armed=false; db.textContent="✕";},2500); return; }
      SESSIONS=SESSIONS.filter(x=>x.id!==s.id); await persistSessions(); showToast("Session deleted"); renderData(); };
    row.appendChild(eb); row.appendChild(db); cl.appendChild(row);
  });
  app.appendChild(cl);

  const c2=document.createElement("div"); c2.className="card";
  c2.innerHTML=`<div class="eyebrow">Restore / import</div><div class="note">Paste a previously exported CSV to merge it back in. Old exports without timing columns work too.</div>`;
  const imp=document.createElement("textarea"); imp.placeholder="paste CSV here…"; c2.appendChild(imp);
  const ib=document.createElement("button"); ib.className="btn btn-ghost"; ib.style.marginTop="10px"; ib.textContent="Import";
  ib.onclick=async()=>{ const added=parseCSV(imp.value); if(!added.length){ showToast("Nothing recognized"); return; }
    SESSIONS=SESSIONS.concat(added); await persistSessions(); showToast(`Imported ${added.length} session${added.length===1?"":"s"}`); renderData(); };
  c2.appendChild(ib); app.appendChild(c2);

  const c3=document.createElement("div"); c3.className="card";
  c3.innerHTML=`<div class="eyebrow">Reset</div><div class="note">Clears all logged sessions on this device. Export first if you want a backup.</div>`;
  const rb=document.createElement("button"); rb.className="btn btn-ghost"; rb.innerHTML=`<span class="danger">Erase all sessions</span>`;
  let armed=false;
  rb.onclick=async()=>{ if(!armed){ armed=true; rb.innerHTML=`<span class="danger">Tap again to confirm</span>`;
      setTimeout(()=>{armed=false; rb.innerHTML=`<span class="danger">Erase all sessions</span>`;},3000); return; }
    SESSIONS=[]; await persistSessions(); showToast("All sessions erased"); renderData(); };
  c3.appendChild(rb); app.appendChild(c3);
}

/* ============ NAV + BOOT ============ */
function syncNav(){ document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("active",x.dataset.tab===TAB)); }
document.querySelectorAll("nav button").forEach(b=>{
  b.onclick=()=>{ TAB=b.dataset.tab; syncNav(); leaveWorkout();
    if(TAB==="train")renderTrain(); else if(TAB==="progress")renderProgress(); else renderData(); };
});
(async()=>{ await detectStore(); await loadAll(); setSync(); renderTrain(); })();
</script>
