<title>Strength Log</title>
<style>
  :root{
    --bg:#0f1115; --surface:#171a20; --surface2:#1f232b; --border:rgba(255,255,255,.09);
    --border2:rgba(255,255,255,.16); --text:#eceae6; --muted:#9aa0a8; --faint:#646a73;
    --accent:#d3982f; --accent-soft:rgba(211,152,47,.16); --good:#5fb87a; --good-soft:rgba(95,184,122,.15);
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f6f4f0; --surface:#ffffff; --surface2:#f1eee9; --border:rgba(0,0,0,.1);
      --border2:rgba(0,0,0,.2); --text:#1b1c1e; --muted:#5f636a; --faint:#8b9099;
      --accent:#b07916; --accent-soft:rgba(176,121,22,.13); --good:#2f8a52; --good-soft:rgba(47,138,82,.14);}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.5}
  body{padding-bottom:84px;max-width:720px;margin:0 auto;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
  h1,h2,h3{font-weight:600;margin:0}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  header{position:sticky;top:0;z-index:5;background:var(--bg);padding:calc(14px + env(safe-area-inset-top)) 16px 10px;
    border-bottom:1px solid var(--border);display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  header h1{font-size:18px;letter-spacing:.2px}
  .sync{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .sync.on{color:var(--good)}
  main{padding:14px 16px}
  .banner{background:var(--accent-soft);border:1px solid var(--border2);border-radius:10px;
    padding:10px 12px;font-size:13px;color:var(--text);margin-bottom:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
  .daycard{display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s}
  .daycard:active{border-color:var(--border2)}
  .daycard .meta{color:var(--muted);font-size:13px;margin-top:3px}
  .chev{color:var(--faint);font-size:22px;line-height:1}
  .eyebrow{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);font-weight:600}
  .ex-name{font-size:16px;font-weight:600;margin-top:2px}
  .ex-target{font-size:13px;color:var(--muted);margin-top:2px}
  .setrow{display:grid;grid-template-columns:34px 1fr 1fr 36px;gap:8px;align-items:center;margin-top:10px}
  .setrow.time{grid-template-columns:34px 1fr 36px}
  .setrow.reps{grid-template-columns:34px 1fr 36px}
  .setlabel{font-family:var(--mono);font-size:13px;color:var(--faint);text-align:center}
  input{font-family:var(--mono);font-size:17px;background:var(--surface2);color:var(--text);
    border:1px solid var(--border);border-radius:10px;padding:11px 10px;width:100%;text-align:center;
    -moz-appearance:textfield}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
  input::placeholder{color:var(--faint)}
  .field-tag{font-size:10px;color:var(--faint);text-align:center;margin-top:3px;font-family:var(--mono);letter-spacing:.5px}
  .icon-btn{background:transparent;border:1px solid var(--border);border-radius:9px;color:var(--muted);
    height:42px;font-size:18px;cursor:pointer;padding:0}
  .icon-btn:active{background:var(--surface2)}
  .addset{margin-top:11px;width:100%;background:transparent;border:1px dashed var(--border2);
    color:var(--muted);border-radius:10px;padding:9px;font-size:14px;cursor:pointer}
  .addset:active{background:var(--surface2)}
  .btn{display:block;width:100%;border:none;border-radius:13px;padding:15px;font-size:16px;font-weight:600;
    cursor:pointer;font-family:var(--sans)}
  .btn-primary{background:var(--accent);color:#1a1206}
  .btn-primary:active{filter:brightness(.92)}
  .btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text)}
  .btn-ghost:active{background:var(--surface2)}
  .topbar{display:flex;align-items:center;gap:6px;margin-bottom:14px}
  .back{background:transparent;border:none;color:var(--accent);font-size:16px;cursor:pointer;padding:6px 4px;font-weight:500}
  .topbar h2{font-size:18px}
  .date-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .date-row label{font-size:13px;color:var(--muted)}
  .date-row input{width:auto;text-align:left;flex:0 0 auto}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--good);
    color:#06210f;padding:11px 18px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;
    transition:opacity .25s, transform .25s;pointer-events:none;z-index:30}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--surface);
    border-top:1px solid var(--border);padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:10}
  nav button{flex:1;background:transparent;border:none;color:var(--muted);font-size:11px;font-weight:600;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;
    font-family:var(--sans);letter-spacing:.3px}
  nav button .ic{font-size:20px;line-height:1}
  nav button.active{color:var(--accent)}
  select{font-family:var(--sans);font-size:15px;background:var(--surface2);color:var(--text);
    border:1px solid var(--border);border-radius:10px;padding:11px;width:100%;margin-bottom:14px}
  .hist{width:100%;border-collapse:collapse;font-size:14px}
  .hist th{text-align:left;color:var(--faint);font-weight:600;font-size:11px;letter-spacing:.6px;
    text-transform:uppercase;padding:7px 6px;border-bottom:1px solid var(--border)}
  .hist td{padding:9px 6px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:14px}
  .hist td.d{font-family:var(--sans);color:var(--muted);font-size:13px}
  .pr{color:var(--good)}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:30px 10px}
  .spark-wrap{display:flex;align-items:flex-end;gap:14px;margin:6px 0 16px}
  .spark-stat .big{font-family:var(--mono);font-size:26px;font-weight:600}
  .spark-stat .lbl{font-size:12px;color:var(--muted)}
  textarea{width:100%;height:150px;background:var(--surface2);color:var(--text);border:1px solid var(--border);
    border-radius:10px;font-family:var(--mono);font-size:12px;padding:10px;margin-top:8px}
  .row-2{display:flex;gap:10px}
  .row-2 .btn{margin-top:0}
  .note{font-size:13px;color:var(--muted);margin:6px 0 16px}
  .danger{color:#d96a6a}
  .ex-links{display:flex;gap:18px;align-items:center;margin-top:8px}
  .howto{margin-top:0;background:transparent;border:none;color:var(--accent);font-size:13px;cursor:pointer;padding:4px 0;font-weight:500;font-family:var(--sans)}
  .demo-link{color:var(--accent);font-size:13px;font-weight:500;text-decoration:none;padding:4px 0}
  .demo-link:active{opacity:.6}
  .howto-body{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5;border-left:2px solid var(--border2);padding-left:10px}
  .timer{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:flex;align-items:center;gap:10px 14px;flex-wrap:wrap}
  .timer-main{display:flex;align-items:baseline;gap:10px;flex:1 1 auto;min-width:0}
  .timer-clock{font-family:var(--mono);font-size:24px;font-weight:600;min-width:70px}
  .timer-clock.work{color:var(--good)}
  .timer-clock.rest{color:var(--accent)}
  .timer-phase{font-size:12px;color:var(--muted)}
  .timer-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:10px;
    padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);white-space:nowrap}
  .timer-btn:active{filter:brightness(.95)}
  .timer-reset{background:transparent;border:none;color:var(--faint);font-size:18px;cursor:pointer;padding:6px}
  .timer-clock.over{color:#d96a6a}
  @keyframes flashpulse{0%,100%{background:transparent}50%{background:var(--accent-soft)}}
  .timer.flash{animation:flashpulse .45s ease 3;border-radius:10px}
  .rest-target{display:flex;align-items:center;gap:8px;flex-basis:100%;font-size:12px;color:var(--muted);margin-top:2px}
  .rt-val{font-family:var(--mono);color:var(--text);font-size:13px;min-width:42px;text-align:center}
  .rt-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;
    width:30px;height:30px;font-size:17px;line-height:1;cursor:pointer;padding:0}
  .rt-btn:active{filter:brightness(.95)}
  .timer-log{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:6px;flex-basis:100%;line-height:1.6}
  #restOverlay{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;background:#000;color:#3b4048;padding:24px;text-align:center}
  #restOverlay.show{display:flex}
  #restOverlay.fired{background:var(--good);color:#06210f}
  #restClock{font-family:var(--mono);font-size:76px;font-weight:600;line-height:1}
  #restOverlay.fired #restClock{color:#06210f}
  #restPhase{font-size:15px;max-width:300px}
  #restStart{background:#14171c;color:#9aa0a8;border:1px solid #262b33;border-radius:14px;
    padding:16px 30px;font-size:17px;font-weight:600;cursor:pointer;font-family:var(--sans)}
  #restOverlay.fired #restStart{background:#06210f;color:#eafff0;border-color:transparent}
  #restDismiss{position:absolute;top:calc(16px + env(safe-area-inset-top));right:20px;background:transparent;
    border:none;color:#4a5059;font-size:24px;cursor:pointer;padding:8px;line-height:1}
  #restOverlay.fired #restDismiss{color:#06210f}
</style>

<header>
  <h1>Strength Log</h1>
  <span class="sync" id="syncTag">…</span>
</header>
<main id="app"></main>
<div class="toast" id="toast"></div>
<nav>
  <button data-tab="train" class="active"><span class="ic">＋</span>Train</button>
  <button data-tab="progress"><span class="ic">＾</span>Progress</button>
  <button data-tab="data"><span class="ic">↧</span>Data</button>
</nav>

<script>
/* ---------- program definition ---------- */
const PLAN = [
  { id:"pushA", name:"Push A", sub:"Chest · Shoulders · Triceps", ex:[
    {id:"pa_press", name:"Floor / Bench DB Press", type:"load", target:"4 × 6–8 · RIR 1–2", info:"Lie back, dumbbells at chest, wrists stacked over elbows. Press up until arms are nearly straight, lower under control until your upper arms touch the floor (or you feel a chest stretch). Drive hard but leave 1–2 reps in reserve."},
    {id:"pa_incl",  name:"Incline DB Press", type:"load", target:"3 × 8–10 · RIR 2", info:"Bench at 30–45°. Press from upper-chest level, elbows about 45° from the torso. Lower slowly, full stretch at the bottom, don’t bounce."},
    {id:"pa_ohp",   name:"Seated DB Shoulder Press", type:"load", target:"3 × 8–10 · RIR 2", info:"Sit tall, dumbbells at ear height. Press overhead without fully flaring the elbows; stop just short of locking out and lower under control."},
    {id:"pa_lat",   name:"DB Lateral Raise", type:"load", target:"3 × 12–15 · RIR 1", info:"Slight forward lean, soft elbows. Raise out to shoulder height leading with the elbows, pinkie slightly up. Light weight, no swinging — lower slowly."},
    {id:"pa_tri",   name:"Overhead Triceps Extension", type:"load", target:"3 × 10–12 · RIR 1", info:"One or two dumbbells overhead. Bend only at the elbows to lower behind your head; keep upper arms still and vertical, then extend fully."},
    {id:"pa_fin",   name:"Finisher: Push-up + Rope", type:"time", target:"~5 min", info:"Alternate a set of push-ups with ~30–45s of jump rope (or jumping jacks) for about 5 minutes, keeping rest minimal. Log total minutes."},
  ]},
  { id:"pullA", name:"Pull A", sub:"Back · Biceps · Rear delts", ex:[
    {id:"la_row",  name:"One-arm DB Row", type:"load", target:"4 × 6–8 / side · RIR 1–2", info:"Knee and hand on the bench, flat back. Pull the dumbbell to your hip pocket leading with the elbow, squeeze, then lower all the way for a full stretch."},
    {id:"la_crow", name:"Chest-supported DB Row", type:"load", target:"3 × 8–10 · RIR 2", info:"Chest on an incline bench. Row both dumbbells up, driving the elbows back and squeezing the shoulder blades together at the top."},
    {id:"la_pull", name:"DB Pullover", type:"load", target:"3 × 10–12 · RIR 2", info:"Hold one dumbbell over your chest with a slight elbow bend. Lower it back over your head until you feel a stretch through the lats, then pull it back over."},
    {id:"la_rear", name:"DB Reverse Fly", type:"load", target:"3 × 12–15 · RIR 1", info:"Hinge forward, soft elbows. Raise the dumbbells out to the sides squeezing the rear delts. Don’t shrug or use momentum — light and strict."},
    {id:"la_ham",  name:"DB Hammer Curl", type:"load", target:"3 × 10–12 · RIR 1", info:"Neutral grip, palms facing in. Curl without swinging the elbows forward, and control the lowering on every rep."},
  ]},
  { id:"legs", name:"Leg Day", sub:"Quads · Hams · Calves · Core", ex:[
    {id:"lg_gob",  name:"DB Goblet Squat", type:"load", target:"4 × 8–10 · RIR 2", info:"Hold one dumbbell at your chest. Sit down between your hips, knees tracking over toes, chest up, then drive up through mid-foot."},
    {id:"lg_rdl",  name:"DB Romanian Deadlift", type:"load", target:"4 × 8–10 · RIR 2", info:"Dumbbells in front of your thighs, soft knees. Push your hips back and lower the weights along your legs until you feel a hamstring stretch, then stand tall and squeeze the glutes."},
    {id:"lg_lun",  name:"DB Walking Lunge", type:"load", target:"3 × 10–12 / leg · RIR 2", info:"Step forward, dropping the back knee toward the floor. Push through the front heel to rise into the next step. Keep your torso tall throughout."},
    {id:"lg_calf", name:"DB Calf Raise", type:"load", target:"3 × 15–20", info:"Rise onto the balls of your feet as high as possible, pause at the top, then lower slowly for a full stretch at the bottom."},
    {id:"lg_db",   name:"Dead Bug", type:"reps", target:"3 × 10 / side", info:"On your back, arms up, knees over hips. Lower the opposite arm and leg toward the floor without letting your low back arch, return, and alternate sides."},
    {id:"lg_fin",  name:"Finisher: Incline Walk / Bike", type:"time", target:"6–8 min", info:"Steady, moderate-effort incline walk or bike for 6–8 minutes to finish. Log total minutes."},
  ]},
  { id:"pushB", name:"Push B", sub:"Shoulder + strength bias", ex:[
    {id:"pb_incl", name:"Incline DB Press", type:"load", target:"4 × 6–8 · RIR 1–2", info:"Heavier incline press in the 6–8 range. Control the lowering, get a full stretch at the bottom, and keep 1–2 reps in reserve."},
    {id:"pb_sa",   name:"Single-arm DB Shoulder Press", type:"load", target:"3 × 6–10 / side · RIR 2", info:"Press one dumbbell overhead while bracing your core to resist leaning sideways. This evens out any left/right strength gap."},
    {id:"pb_flat", name:"Flat DB Press", type:"load", target:"3 × 8–10 · RIR 2", info:"Flat bench, wrists stacked over elbows. Press from chest level through a full range, lowering under control."},
    {id:"pb_lat",  name:"DB Lateral Raise (slow)", type:"load", target:"3 × 12–15 · RIR 1", info:"Lateral raise with a deliberate 2–3 second lower on each rep. Very light weight, strict form, no swinging."},
    {id:"pb_skull",name:"Skull Crusher → Close-grip", type:"load", target:"3 × 10–12 · RIR 1", info:"Lying down, bend only at the elbows to lower the dumbbells toward your forehead, then extend. When the triceps fatigue, finish the set with close-grip presses."},
  ]},
  { id:"pullB", name:"Pull B + Core", sub:"Back · Biceps · Core", ex:[
    {id:"lb_ren",  name:"Renegade Row", type:"load", target:"3 × 8–10 / side · RIR 2", info:"In a push-up position gripping the dumbbells, row one to your hip while keeping your hips square and stable — don’t rotate. Alternate sides."},
    {id:"lb_high", name:"DB High Pull / Upright Row", type:"load", target:"3 × 10–12 · RIR 2", info:"Pull the dumbbells up the front of your body, leading with the elbows to about chest height. Keep it smooth and avoid shrugging into your neck."},
    {id:"lb_row",  name:"One-arm DB Row", type:"load", target:"3 × 8–10 / side · RIR 1–2", info:"Knee and hand on the bench, flat back. Pull to the hip pocket leading with the elbow, squeeze, and lower fully for a stretch."},
    {id:"lb_rear", name:"DB Reverse Fly", type:"load", target:"3 × 12–15 · RIR 1", info:"Hinge forward, soft elbows, raise out to the sides squeezing the rear delts. Light and strict, no momentum."},
    {id:"lb_curl", name:"DB Curl (alternating)", type:"load", target:"3 × 10–12 · RIR 1", info:"Curl one arm at a time, rotating the palm up (supinate) as you lift. No swinging, and control the lowering."},
    {id:"lb_hollow",name:"Hollow Hold", type:"time", target:"3 × 20–30 sec", info:"On your back, press your low back into the floor, then lift your shoulders and legs with arms overhead into a shallow dish shape. Hold and breathe; log seconds held."},
  ]},
];
const EX_INDEX = {}; PLAN.forEach(d=>d.ex.forEach(e=>EX_INDEX[e.id]={...e,day:d.name}));
const KEY = "wt_sessions_v1";

/* ---------- storage layer ---------- */
let SESSIONS = [];           // [{id,date,dayId,entries:{exId:[{w,r}|{r}|{s}]}}]
let storageOK = false;
let memOnly = false;
let STORE = null;   // "claude" | "local" | null

async function loadSessions(){
  // Prefer Claude's account storage if the host injected it...
  if(window.storage && window.storage.get){
    try{
      const res = await window.storage.get(KEY);
      if(res && res.value) SESSIONS = JSON.parse(res.value);
      STORE="claude"; storageOK=true; return;
    }catch(e){
      try{ await window.storage.set(KEY, JSON.stringify([])); STORE="claude"; storageOK=true; return; }
      catch(e2){ /* fall through to localStorage */ }
    }
  }
  // ...otherwise save on this device (works once the file is hosted / added to home screen)
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) SESSIONS = JSON.parse(raw);
    localStorage.setItem(KEY+"_probe","1"); localStorage.removeItem(KEY+"_probe");
    STORE="local"; storageOK=true; return;
  }catch(e){ /* sandboxed preview with no storage at all */ }
  memOnly=true;
}
async function persist(){
  if(memOnly) return;
  try{
    if(STORE==="claude") await window.storage.set(KEY, JSON.stringify(SESSIONS));
    else localStorage.setItem(KEY, JSON.stringify(SESSIONS));
    storageOK=true; setSync();
  }catch(e){ storageOK=false; setSync(); }
}
function setSync(){
  const t=document.getElementById("syncTag");
  if(memOnly){ t.textContent="not saving"; t.className="sync"; }
  else if(storageOK){ t.textContent="saved ✓"; t.className="sync on"; }
  else{ t.textContent="save failed"; t.className="sync"; }
}

/* ---------- helpers ---------- */
const $ = (s,el=document)=>el.querySelector(s);
const app = document.getElementById("app");
let TAB = "train";
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function fmtDate(iso){ const [y,m,d]=iso.split("-"); return new Date(y,m-1,d).toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function lastEntryFor(exId, beforeId){
  // most recent saved sets for an exercise
  const sorted=[...SESSIONS].sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  for(const s of sorted){ if(s.id===beforeId) continue; if(s.entries[exId] && s.entries[exId].length) return s.entries[exId]; }
  return null;
}
function topMetric(ex, sets){
  if(!sets||!sets.length) return null;
  if(ex.type==="time") return Math.max(...sets.map(x=>+x.s||0));
  if(ex.type==="reps") return Math.max(...sets.map(x=>+x.r||0));
  return Math.max(...sets.map(x=>+x.w||0)); // load: heaviest weight used
}
function showToast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }
function clk(s){ s=Math.max(0,Math.round(s)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
let AC=null;
function unlockAudio(){ try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==="suspended") AC.resume(); }catch(e){} }
function beep(){
  try{
    if(!AC) return;
    const tone=(freq,at,dur)=>{ const o=AC.createOscillator(), g=AC.createGain(); o.type="sine"; o.frequency.value=freq;
      o.connect(g); g.connect(AC.destination);
      g.gain.setValueAtTime(0.0001, AC.currentTime+at);
      g.gain.exponentialRampToValueAtTime(0.45, AC.currentTime+at+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+at+dur);
      o.start(AC.currentTime+at); o.stop(AC.currentTime+at+dur+0.02); };
    tone(880,0,0.18); tone(1175,0.22,0.28);
  }catch(e){}
}
let TICK=null;
function startTick(){ if(TICK) return; TICK=setInterval(()=>{
  const live=document.querySelectorAll('.timer-clock[data-running="1"]');
  if(!live.length){ stopTick(); return; }
  live.forEach(el=>{ el.textContent=clk((Date.now()-(+el.dataset.start))/1000); });
},250); }
function stopTick(){ if(TICK){ clearInterval(TICK); TICK=null; } }

let wakeSentinel=null;
async function acquireWake(){ try{ if("wakeLock" in navigator){ wakeSentinel=await navigator.wakeLock.request("screen"); } }catch(e){} }
function releaseWake(){ try{ if(wakeSentinel){ wakeSentinel.release(); wakeSentinel=null; } }catch(e){} }
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible" && Rest.active && !wakeSentinel) acquireWake(); });

let ov=null, ovClock=null, ovPhase=null, ovStart=null;
function ensureOverlay(){
  if(ov) return;
  ov=document.createElement("div"); ov.id="restOverlay";
  const dismiss=document.createElement("button"); dismiss.id="restDismiss"; dismiss.textContent="✕"; dismiss.setAttribute("aria-label","Hide");
  ovClock=document.createElement("div"); ovClock.id="restClock"; ovClock.textContent="0:00";
  ovPhase=document.createElement("div"); ovPhase.id="restPhase"; ovPhase.textContent="Rest";
  ovStart=document.createElement("button"); ovStart.id="restStart"; ovStart.textContent="Start set";
  ovStart.onclick=()=>{ unlockAudio(); Rest.startNext(); };
  dismiss.onclick=()=>{ Rest.stop(); };
  ov.appendChild(dismiss); ov.appendChild(ovClock); ov.appendChild(ovPhase); ov.appendChild(ovStart);
  document.body.appendChild(ov);
}
const Rest={
  active:false, target:0, startTs:0, loop:null, onStart:null, alerted:false,
  start(opts){
    this.active=true; this.target=opts.target; this.startTs=Date.now(); this.onStart=opts.onStart; this.alerted=false;
    ensureOverlay();
    ov.classList.remove("fired"); ov.classList.add("show");
    ovPhase.textContent=`then set ${opts.next} · ${opts.exName}`;
    ovStart.textContent=`Start set ${opts.next}`;
    acquireWake(); this.run();
  },
  run(){
    if(!this.active) return;
    const remain=this.target-(Date.now()-this.startTs)/1000;
    if(remain<=0){
      if(!this.alerted){ this.alerted=true; flood(); ovPhase.textContent="Rest done — go!"; }
      ovClock.textContent="+"+clk(-remain);
    }
    else ovClock.textContent=clk(remain);
    this.loop=setTimeout(()=>this.run(),250);
  },
  startNext(){ const cb=this.onStart; this.stop(); if(cb) cb(); },
  stop(){ this.active=false; if(this.loop){ clearTimeout(this.loop); this.loop=null; } if(ov){ ov.classList.remove("show","fired"); } releaseWake(); }
};
function flood(){ beep(); if(navigator.vibrate){ try{ navigator.vibrate([180,90,180]); }catch(e){} } if(ov){ ov.classList.add("fired"); } }
function endRestUI(){ Rest.stop(); }

function prevSummary(ex,sets){
  if(ex.type==="time") return sets.map(x=>x.s+"s").join(" / ");
  if(ex.type==="reps") return sets.map(x=>x.r).join(" / ")+" reps";
  return sets.map(x=>`${x.w}×${x.r}`).join(" / ");
}
function addSetRow(wrap, ex, idx, prev){
  const row=document.createElement("div"); row.className="setrow "+(ex.type==="load"?"":ex.type);
  const lbl=document.createElement("div"); lbl.className="setlabel"; lbl.textContent=idx+1; row.appendChild(lbl);
  const mk=(ph,val,tag)=>{ const w=document.createElement("div");
    const inp=document.createElement("input"); inp.inputMode="decimal"; inp.placeholder=ph;
    if(val!=null) inp.value=val; w.appendChild(inp);
    const t=document.createElement("div"); t.className="field-tag"; t.textContent=tag; w.appendChild(t);
    return {w,inp}; };
  let f1,f2;
  if(ex.type==="time"){ f1=mk("0","",(prev&&prev.s)||"sec"); if(prev&&prev.s!=null)f1.inp.value=prev.s; f1.inp.placeholder="sec"; row.appendChild(f1.w); }
  else if(ex.type==="reps"){ f1=mk("0",prev?prev.r:null,"reps"); row.appendChild(f1.w); }
  else { f1=mk("kg",prev?prev.w:null,"kg"); f2=mk("reps",prev?prev.r:null,"reps"); row.appendChild(f1.w); row.appendChild(f2.w); }
  const del=document.createElement("button"); del.className="icon-btn"; del.textContent="×";
  del.onclick=()=>{ row.remove(); reindex(wrap); }; row.appendChild(del);
  row._read=()=>{
    if(ex.type==="time"){ const s=parseFloat(f1.inp.value); return isNaN(s)?null:{s}; }
    if(ex.type==="reps"){ const r=parseFloat(f1.inp.value); return isNaN(r)?null:{r}; }
    const w=parseFloat(f1.inp.value), r=parseFloat(f2.inp.value);
    if(isNaN(w)&&isNaN(r)) return null; return {w:isNaN(w)?0:w, r:isNaN(r)?0:r};
  };
  wrap.appendChild(row);
}
function reindex(wrap){ [...wrap.children].forEach((r,i)=> r.querySelector(".setlabel").textContent=i+1); }

function restTarget(ex){
  if(ex.type==="reps") return 45;
  const m=ex.target.match(/×\s*(\d+)/); const lo=m?+m[1]:10;
  if(lo<=6) return 120; if(lo<=8) return 90; if(lo<=10) return 75; if(lo<=12) return 60; return 60;
}
function makeTimer(ex){
  const T = (draft.timing[ex.id] = { phase:"idle", setIdx:0, startTs:0, sets:[], restTarget:restTarget(ex) });
  const wrap=document.createElement("div"); wrap.className="timer";
  const main=document.createElement("div"); main.className="timer-main";
  const clock=document.createElement("span"); clock.className="timer-clock"; clock.textContent="0:00"; clock.dataset.running="0"; clock.dataset.mode="up";
  const phase=document.createElement("div"); phase.className="timer-phase"; phase.textContent="Ready";
  main.appendChild(clock); main.appendChild(phase);
  const btn=document.createElement("button"); btn.className="timer-btn"; btn.textContent="▶ Start set 1";
  const reset=document.createElement("button"); reset.className="timer-reset"; reset.textContent="↺"; reset.title="Reset timer";
  const rt=document.createElement("div"); rt.className="rest-target";
  const minus=document.createElement("button"); minus.className="rt-btn"; minus.textContent="−";
  const val=document.createElement("span"); val.className="rt-val"; val.textContent=T.restTarget+"s";
  const plus=document.createElement("button"); plus.className="rt-btn"; plus.textContent="+";
  minus.onclick=()=>{ T.restTarget=Math.max(15,T.restTarget-15); val.textContent=T.restTarget+"s"; if(T.phase==="rest"){ Rest.target=T.restTarget; } };
  plus.onclick=()=>{ T.restTarget=T.restTarget+15; val.textContent=T.restTarget+"s"; if(T.phase==="rest"){ Rest.target=T.restTarget; } };
  rt.appendChild(document.createTextNode("Rest target")); rt.appendChild(minus); rt.appendChild(val); rt.appendChild(plus);
  const log=document.createElement("div"); log.className="timer-log";
  function renderLog(){
    log.textContent = T.sets.filter(s=>s).map((s,i)=>{
      const w=s.work!=null?clk(s.work)+" set":""; const r=s.rest!=null?clk(s.rest)+" rest":"";
      return `S${i+1} ${[w,r].filter(Boolean).join(" · ")}`.trim();
    }).join("    ");
  }
  function enterWork(){
    unlockAudio();
    const now=Date.now();
    if(T.phase==="rest"){ const el=Math.round((now-T.startTs)/1000); (T.sets[T.setIdx]=T.sets[T.setIdx]||{}).rest=el; T.setIdx++; }
    T.sets[T.setIdx]=T.sets[T.setIdx]||{};
    T.phase="work"; T.startTs=now;
    clock.className="timer-clock work"; clock.dataset.mode="up"; clock.dataset.start=now; clock.dataset.running="1"; clock.textContent="0:00";
    phase.textContent=`Set ${T.setIdx+1} — working`;
    btn.textContent=`■ Done set ${T.setIdx+1} → rest`;
    startTick(); renderLog();
  }
  function enterRest(){
    unlockAudio();
    const now=Date.now();
    const el=Math.round((now-T.startTs)/1000); (T.sets[T.setIdx]=T.sets[T.setIdx]||{}).work=el;
    T.phase="rest"; T.startTs=now;
    clock.className="timer-clock"; clock.dataset.running="0"; clock.textContent="rest";
    phase.textContent=`Resting · ${T.restTarget}s target`;
    btn.textContent=`▶ Start set ${T.setIdx+2}`;
    Rest.start({ target:T.restTarget, next:T.setIdx+2, exName:ex.name, onStart:enterWork });
    renderLog();
  }
  btn.onclick=()=>{
    if(T.phase==="work") enterRest();
    else if(T.phase==="rest") Rest.startNext();
    else enterWork();
  };
  reset.onclick=()=>{
    Rest.stop();
    T.phase="idle"; T.setIdx=0; T.sets=[]; T.startTs=0;
    clock.className="timer-clock"; clock.dataset.running="0"; clock.dataset.mode="up"; clock.textContent="0:00";
    phase.textContent="Ready"; btn.textContent="▶ Start set 1"; log.textContent="";
  }

  wrap.appendChild(main); wrap.appendChild(btn); wrap.appendChild(reset); wrap.appendChild(rt); wrap.appendChild(log);
  return wrap;
}

async function saveSession(){
  const entries={}; let any=false;
  PLAN.find(d=>d.id===draft.dayId).ex.forEach(ex=>{
    const wrap=$(`[data-ex="${ex.id}"]`); if(!wrap) return;
    const sets=[...wrap.children].map(r=>r._read()).filter(Boolean);
    if(sets.length){
      const T=draft.timing[ex.id];
      if(T){ sets.forEach((set,i)=>{ const t=T.sets[i]; if(t){ if(t.work!=null)set.sw=t.work; if(t.rest!=null)set.sr=t.rest; } }); }
      entries[ex.id]=sets; any=true;
    }
  });
  if(!any){ showToast("Log at least one set"); return; }
  SESSIONS.push({ id:Date.now().toString(36), date:draft.date, dayId:draft.dayId, entries });
  await persist();
  stopTick(); endRestUI();
  showToast("Session saved");
  draft=null; renderTrain();
}

function renderExProgress(out, ex){
  const series=SESSIONS.filter(s=>s.entries[ex.id]).sort((a,b)=>a.date.localeCompare(b.date))
    .map(s=>({date:s.date, top:topMetric(ex, s.entries[ex.id]), sets:s.entries[ex.id]}));
  if(!series.length){ out.innerHTML=`<div class="empty">No sessions logged for ${ex.name} yet.</div>`; return; }
  const unit = ex.type==="time"?"sec": ex.type==="reps"?"reps":"kg";
  const latest=series[series.length-1].top, peak=Math.max(...series.map(p=>p.top));
  out.innerHTML="";
  const stat=document.createElement("div"); stat.className="spark-wrap";
  stat.innerHTML=`<div class="spark-stat"><div class="big num">${latest}<span style="font-size:14px;color:var(--muted)"> ${unit}</span></div><div class="lbl">latest top set</div></div>`+
    spark(series.map(p=>p.top))+
    `<div class="spark-stat"><div class="big num" style="color:var(--accent)">${peak}</div><div class="lbl">best</div></div>`;
  out.appendChild(stat);
  const tbl=document.createElement("table"); tbl.className="hist";
  tbl.innerHTML=`<tr><th>Date</th><th>Sets</th><th>Top</th></tr>`;
  let prevTop=-Infinity;
  [...series].reverse().forEach(p=>{
    const isPR = p.top>=peak && p.top>0;
    const setsTxt = ex.type==="time"? p.sets.map(x=>x.s+"s").join(" ")
      : ex.type==="reps"? p.sets.map(x=>x.r).join(" ")
      : p.sets.map(x=>`${x.w}×${x.r}`).join("  ");

      `<tr><td class="d">${fmtDate(p.date)}</td><td>${setsTxt}</td><td class="${isPR?"pr":""}">${p.top}${isPR?" ★":""}</td></tr>`);
  });
  out.appendChild(tbl);
}
function spark(vals){
  const w=150,h=46,pad=4; if(vals.length<2){ return `<svg width="${w}" height="${h}"></svg>`; }
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>{ const x=pad+i*(w-2*pad)/(vals.length-1); const y=h-pad-((v-min)/rng)*(h-2*pad); return [x,y]; });
  const d=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const last=pts[pts.length-1];
  return `<svg width="${w}" height="${h}" style="flex:1"><path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3" fill="var(--accent)"/></svg>`;
}

/* ---------- render: DATA ---------- */
function buildCSV(){
  const rows=[["date","day","exercise","set","weight_kg","reps","seconds","set_seconds","rest_seconds"]];
  [...SESSIONS].sort((a,b)=>a.date.localeCompare(b.date)).forEach(s=>{
    const dayName=(PLAN.find(d=>d.id===s.dayId)||{}).name||s.dayId;
    Object.keys(s.entries).forEach(exId=>{
      const ex=EX_INDEX[exId]||{name:exId,type:"load"};
      s.entries[exId].forEach((set,i)=>{
        rows.push([s.date, dayName, ex.name, i+1,
          set.w!=null?set.w:"", set.r!=null?set.r:"", set.s!=null?set.s:"",
          set.sw!=null?set.sw:"", set.sr!=null?set.sr:""]);
      });
    });
  });
  return rows.map(r=>r.join(",")).join("\n");
}
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/); lines.shift();
  const byKey={};
  lines.forEach(line=>{
    const c=line.split(","); if(c.length<7) return;
    const [date,dayName,exName,setN,w,r,s,sw,sr]=c;
    const day=PLAN.find(d=>d.name===dayName); if(!day) return;
    const ex=day.ex.find(e=>e.name===exName); if(!ex) return;
    const k=date+"|"+day.id;
    if(!byKey[k]) byKey[k]={id:(Date.parse(date)||Date.now()).toString(36)+Math.random().toString(36).slice(2,5),date,dayId:day.id,entries:{}};
    if(!byKey[k].entries[ex.id]) byKey[k].entries[ex.id]=[];
    const set={}; if(w!=="")set.w=+w; if(r!=="")set.r=+r; if(s!=="")set.s=+s; if(sw!==undefined&&sw!=="")set.sw=+sw; if(sr!==undefined&&sr!=="")set.sr=+sr;
    byKey[k].entries[ex.id].push(set);
  });
  return Object.values(byKey);
}
function renderData(){
  stopTick(); endRestUI();
  app.innerHTML="";
  const csv=buildCSV();
  const count=SESSIONS.length;
  const c1=document.createElement("div"); c1.className="card";
  c1.innerHTML=`<div class="eyebrow">Your data</div><div class="ex-name">${count} session${count===1?"":"s"} logged</div>
    <div class="note">${STORE==="local"?"Saved on this device.":STORE==="claude"?"Saved to your Claude account.":"Not saving in this preview."} Export a CSV now and then as your backup — same shape as your body-composition sheet, and it's how you move data to another device.</div>`;
  const exp=document.createElement("button"); exp.className="btn btn-primary"; exp.textContent="Export CSV";
  exp.onclick=()=>{ try{ const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob);
      const a=document.createElement("a"); a.href=url; a.download="strength_log.csv"; a.click(); URL.revokeObjectURL(url);
    }catch(e){} ta.style.display="block"; ta.select(); showToast("CSV ready below — copy if it didn't download"); };
  c1.appendChild(exp);
  const ta=document.createElement("textarea"); ta.readOnly=true; ta.value=csv; ta.style.display="none"; c1.appendChild(ta);
  app.appendChild(c1);

  const c2=document.createElement("div"); c2.className="card";
  c2.innerHTML=`<div class="eyebrow">Restore / import</div><div class="note">Paste a previously exported CSV to merge it back in.</div>`;
  const imp=document.createElement("textarea"); imp.placeholder="paste CSV here…"; imp.style.display="block"; c2.appendChild(imp);
  const ib=document.createElement("button"); ib.className="btn btn-ghost"; ib.style.marginTop="10px"; ib.textContent="Import";
  ib.onclick=async()=>{ const added=parseCSV(imp.value); if(!added.length){ showToast("Nothing recognized"); return; }
    SESSIONS=SESSIONS.concat(added); await persist(); showToast(`Imported ${added.length} session${added.length===1?"":"s"}`); renderData(); };
  c2.appendChild(ib); app.appendChild(c2);

  const c3=document.createElement("div"); c3.className="card";
  c3.innerHTML=`<div class="eyebrow">Reset</div><div class="note">Clears all logged sessions on this account. Export first if you want a backup.</div>`;
  const rb=document.createElement("button"); rb.className="btn btn-ghost"; rb.innerHTML=`<span class="danger">Erase all sessions</span>`;
  let armed=false;
  rb.onclick=async()=>{ if(!armed){ armed=true; rb.innerHTML=`<span class="danger">Tap again to confirm</span>`; setTimeout(()=>{armed=false; rb.innerHTML=`<span class="danger">Erase all sessions</span>`;},3000); return; }
    SESSIONS=[]; await persist(); showToast("All sessions erased"); renderData(); };
  c3.appendChild(rb); app.appendChild(c3);
}
